<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site Simples</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 20px;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <h1>Meu Primeiro Site</h1>
    <p>Exemplo simples em HTML</p>
</header>

<nav>
    <a href="#">Início</a>
    <a href="#">Sobre</a>
    <a href="#">Contato</a>
</nav>

<div class="container">
    <h2>Bem-vindo!</h2>
    <p>Esse é um site simples que você pode usar como base para seus projetos no GitHub.</p>

    <h3>O que você pode fazer:</h3>
    <ul>
        <li>Editar textos</li>
        <li>Mudar cores</li>
        <li>Adicionar imagens</li>
        <li>Criar novas páginas</li>
    </ul>
</div>

<footer>
    <p>© 2026 - Meu Site</p>
</footer>

</body>
</html>
